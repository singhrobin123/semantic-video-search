name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-ci-mock-key' }}
  DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/vectordb
  LLM_PROVIDER: openai
  APP_ENV: development

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vectordb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d vectordb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/unit/ -v --tb=short --junitxml=test-results/unit.xml

      - name: Run integration tests
        run: |
          cd backend
          python -m pytest tests/integration/ -v --tb=short --junitxml=test-results/integration.xml

      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
